# nginx config for cml-archive: replaces the existing fcgiwrap block
# with a reverse proxy to the Starman unix socket from cml.service.
#
# Drop this into the relevant server { } block (or tweak the location
# pattern to match the URL prefix you currently expose).

upstream cml_backend {
    server unix:/run/cml/cml.sock;
}

server {
    # ... existing listen / server_name / ssl directives ...

    location = / {
        proxy_pass         http://cml_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # If the archive is mounted at a sub-path (say /cml/), use:
    #
    # location = /cml/ {
    #     proxy_pass http://cml_backend/;
    #     ...
    # }
    #
    # Note: cml.cgi has $myname="/" hardcoded, so links it generates
    # use /. Either keep mount at / or also patch $myname in cml.cgi.
}
